name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🛠️ Build Web App
        run: flutter build web --release

      - name: 🟢 Setup Node.js (for Cloud Functions)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Functions dependencies
        run: |
          cd functions
          npm ci

      - name: 🚀 Deploy to Firebase (Hosting + Functions)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ITSLAWREY_FLUTTER_DEMOS }}
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:binance,functions --project itslawrey-flutter-demos --token "$FIREBASE_TOKEN"
